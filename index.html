<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KharchSaathi</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  display:flex;
  background:#0f172a;
  color:white;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  width:220px;
  background:#111827;
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.logo{
  font-size:20px;
  font-weight:bold;
  margin-bottom:20px;
}

.nav{
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.nav:hover,.active{
  background:#1f2937;
}

/* Main */
.main{
  flex:1;
  padding:40px;
}

.section{display:none;}
.section.active{display:block;}

.upload{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:25px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card h4{
  color:#94a3b8;
  margin-bottom:8px;
  font-size:14px;
}

.card p{
  font-size:22px;
  font-weight:bold;
}

.charts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:25px;
}

canvas{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">💰 KharchSaathi</div>
  <div class="nav active" data-section="dashboard">Dashboard</div>
  <div class="nav" data-section="analytics">Analytics</div>
  <div class="nav" data-section="insights">Insights</div>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="section active">
    <div class="upload">
      <input type="file" id="csvFile" accept=".csv">
    </div>

    <div class="cards">
      <div class="card" data-section="analytics">
        <h4>Total Income</h4>
        <p id="income">₹0</p>
      </div>

      <div class="card" data-section="analytics">
        <h4>Total Expenses</h4>
        <p id="expense">₹0</p>
      </div>

      <div class="card" data-section="insights">
        <h4>Savings</h4>
        <p id="savings">₹0</p>
      </div>
    </div>

    <div class="charts">
      <canvas id="overviewChart"></canvas>
    </div>
  </div>

  <!-- ANALYTICS -->
  <div id="analytics" class="section">
    <div class="charts">
      <canvas id="categoryChart"></canvas>
      <canvas id="monthlyChart"></canvas>
    </div>
  </div>

  <!-- INSIGHTS -->
  <div id="insights" class="section">
    <div class="charts">
      <canvas id="topExpenseChart"></canvas>
    </div>
  </div>

</div>

<script type="module" src="./js/chart.js"></script>
</body>
</html>
